<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Assignment Security Checker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">⬡</span>
      <div>
        <div class="logo-title">SAST</div>
        <div class="logo-sub">Security Scanner</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-view="scanner" onclick="switchView('scanner')">
        <span class="nav-icon">◈</span> Scanner
      </a>
      <a class="nav-item" data-view="results" onclick="switchView('results')">
        <span class="nav-icon">◉</span> Results
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-key-label">API Key</div>
      <input type="text" id="api-key" class="sidebar-key-input" placeholder="x-student-key…" autocomplete="off" />
      <div id="key-status" class="key-status"></div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Scanner</div>
      <div class="topbar-right">
        <div id="error-banner" class="error-banner hidden">
          <span id="error-message"></span>
          <button onclick="dismissError()">✕</button>
        </div>
      </div>
    </header>

    <!-- ── SCANNER VIEW ── -->
    <section class="view active" id="view-scanner">
      <div class="scanner-layout">

        <!-- Left: input panel -->
        <div class="panel input-panel">
          <div class="panel-header">
            <span class="panel-dot red"></span>
            <span class="panel-dot yellow"></span>
            <span class="panel-dot green"></span>
            <span class="panel-label">Code Input</span>
          </div>

          <div class="form-row">
            <label>Language</label>
            <select id="language" class="select">
              <option value="">— select —</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="go">Go</option>
              <option value="ruby">Ruby</option>
              <option value="c">C</option>
              <option value="cpp">C++</option>
            </select>
          </div>

          <textarea id="code" class="code-input" placeholder="Paste your code here..." spellcheck="false"></textarea>

          <button id="submit-btn" class="btn-scan" onclick="handleSubmit()">
            <span id="btn-label">Scan Code</span>
          </button>
        </div>

        <!-- Right: status panel -->
        <div class="panel status-panel">
          <div class="panel-header">
            <span class="panel-dot green"></span>
            <span class="panel-label">Status</span>
            <span id="status-badge" class="status-badge hidden">PENDING</span>
          </div>

          <div class="status-idle" id="status-idle">
            <div class="idle-icon">◌</div>
            <div class="idle-text">Awaiting scan submission</div>
          </div>

          <div class="status-running hidden" id="status-running">
            <div class="spinner-ring"></div>
            <div class="running-label">Scanning…</div>
            <div class="scan-id-row">
              Scan ID: <code id="status-scan-id">—</code>
            </div>
          </div>

          <div class="status-done hidden" id="status-done">
            <div class="done-icon">✓</div>
            <div class="done-label">Scan complete</div>
            <button class="btn-view-results" onclick="switchView('results')">View Results →</button>
          </div>

          <div class="status-failed hidden" id="status-failed">
            <div class="fail-icon">✗</div>
            <div class="fail-label">Scan failed</div>
            <div id="fail-scan-id" class="scan-id-row"></div>
          </div>

        </div>

      </div>
    </section>

    <!-- ── RESULTS VIEW ── -->
    <section class="view hidden" id="view-results">

      <!-- KPI row -->
      <div class="kpi-row">
        <div class="kpi-card kpi-high">
          <div class="kpi-label">HIGH</div>
          <div class="kpi-value" id="kpi-high">—</div>
        </div>
        <div class="kpi-card kpi-medium">
          <div class="kpi-label">MEDIUM</div>
          <div class="kpi-value" id="kpi-medium">—</div>
        </div>
        <div class="kpi-card kpi-low">
          <div class="kpi-label">LOW</div>
          <div class="kpi-value" id="kpi-low">—</div>
        </div>
        <div class="kpi-card kpi-total">
          <div class="kpi-label">TOTAL</div>
          <div class="kpi-value" id="kpi-total">—</div>
        </div>
      </div>

      <!-- Meta bar -->
      <div class="result-meta-bar" id="result-meta-bar"></div>

      <!-- Findings panel -->
      <div class="panel findings-panel">
        <div class="panel-header">
          <span class="panel-dot green"></span>
          <span class="panel-label">Findings</span>
        </div>
        <div id="results"></div>
      </div>

    </section>

  </div><!-- /main -->

  <script src="js/results.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
