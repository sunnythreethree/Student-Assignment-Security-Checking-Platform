AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Lambda A — Input validation and SQS dispatch layer for the SAST platform.
  Imports SQS queue URL/ARN from the sast-sqs stack.
  Jingsi Zhang | CS6620 Group 9

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:

  CodeBucket:
    Type: String
    Description: S3 bucket where lambda_a.zip was uploaded.

  CodeKey:
    Type: String
    Default: lambda_a.zip
    Description: S3 object key for the Lambda A deployment package.

  DynamoDBTableName:
    Type: String
    Default: ScanResults
    Description: DynamoDB table name (must match dynamodb.yaml stack).

  S3ReportBucket:
    Type: String
    Default: sast-platform-reports
    Description: S3 bucket where scan reports are stored (used for presigned URLs).

  SQSStackName:
    Type: String
    Default: sast-sqs
    Description: >
      Name of the CloudFormation stack that deployed sqs.yaml.
      Used to import ScanQueueUrl and ScanQueueArn via Fn::ImportValue.

  AuthTableName:
    Type: String
    Default: StudentAuth
    Description: DynamoDB table for X-Student-Key → student_id auth lookup.

  LambdaTimeout:
    Type: Number
    Default: 30
    Description: Lambda timeout in seconds (validation + SQS write is fast).

  LambdaMemory:
    Type: Number
    Default: 256
    Description: Lambda memory in MB.

  ReservedConcurrency:
    Type: Number
    Default: 10
    Description: >
      Maximum concurrent Lambda A executions (global DoS guard).
      Set to 0 to use unreserved concurrency (no explicit limit).
      Independent of per-student rate limiting enforced in code.

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  # When ReservedConcurrency is 0 the property is omitted entirely, which
  # leaves Lambda A on the account-level unreserved concurrency pool.
  HasReservedConcurrency: !Not [!Equals [!Ref ReservedConcurrency, 0]]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- Lambda Function -----------------------------------------------------
  LambdaAFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: sast-lambda-a
      Description: "SAST Platform — input validation, scan_id generation, SQS dispatch"
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemory
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          SQS_QUEUE_URL:
            Fn::ImportValue: !Sub "${SQSStackName}-ScanQueueUrl"
          DYNAMODB_TABLE: !Ref DynamoDBTableName
          S3_BUCKET: !Ref S3ReportBucket
          AUTH_TABLE: !Ref AuthTableName
      ReservedConcurrentExecutions: !If
        - HasReservedConcurrency
        - !Ref ReservedConcurrency
        - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: sast-platform
        - Key: Component
          Value: lambda-a
        - Key: Owner
          Value: Jingsi

  # --- API Gateway HTTP API ------------------------------------------------
  # Replaces Lambda Function URL.
  # Lambda Function URLs use lambda:InvokeFunctionUrl which is blocked by
  # the AWS Academy SCP. API Gateway uses lambda:InvokeFunction which is
  # allowed. Payload format 2.0 produces the same event shape as Function
  # URLs so handler.py needs no changes.
  LambdaAApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-Student-Key
        MaxAge: 86400

  LambdaAIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref LambdaAApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnArn}/invocations"
        - FnArn: !GetAtt LambdaAFunction.Arn
      PayloadFormatVersion: "2.0"

  LambdaARoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref LambdaAApi
      RouteKey: "$default"
      Target: !Sub "integrations/${LambdaAIntegration}"

  LambdaAStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref LambdaAApi
      StageName: "$default"
      AutoDeploy: true

  # --- Permission for API Gateway to invoke Lambda -------------------------
  LambdaAApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaAFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LambdaAApi}/*"

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:

  LambdaAFunctionArn:
    Description: ARN of Lambda A
    Value: !GetAtt LambdaAFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaAArn"

  LambdaAApiUrl:
    Description: >
      Public HTTPS endpoint for Lambda A via API Gateway HTTP API.
      Frontend POST /scan and GET /status calls go here.
    Value: !Sub "https://${LambdaAApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-LambdaAUrl"