AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda B for SAST Platform - Security scanning engine that consumes SQS messages'

Parameters:
  ProjectName:
    Type: String
    Default: 'sast-platform'
    Description: 'Project name for resource naming'
  
  Environment:
    Type: String
    Default: 'dev'
    AllowedValues: [dev, staging, prod]
    Description: 'Environment name'
  
  SQSQueueArn:
    Type: String
    Description: 'ARN of the SQS queue for scan requests'
  
  DynamoDBTableName:
    Type: String
    Description: 'DynamoDB table name for scan status'
    Default: 'sast-scans'
  
  S3BucketName:
    Type: String
    Description: 'S3 bucket name for scan reports'

  ImageUri:
    Type: String
    Description: 'ECR image URI for Lambda B container (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/sast-scanner:latest)'
  
  ECSClusterName:
    Type: String
    Description: 'ECS cluster name for fallback processing'
    Default: ''
  
  ECSTaskDefinitionArn:
    Type: String
    Description: 'ECS task definition ARN for fallback processing'
    Default: ''
  
  SubnetIds:
    Type: CommaDelimitedList
    Description: 'Subnet IDs for ECS tasks (comma-separated)'
    Default: ''
  
  SecurityGroupIds:
    Type: CommaDelimitedList
    Description: 'Security group IDs for ECS tasks (comma-separated)'
    Default: ''

Conditions:
  HasSubnets: !Not [!Equals [!Join [',', !Ref SubnetIds], '']]
  HasSecurityGroups: !Not [!Equals [!Join [',', !Ref SecurityGroupIds], '']]

Resources:
  # CloudWatch Log Group for Lambda B
  LambdaBLogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-scanner'
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Lambda B Function (container image — avoids 250MB zip size limit for semgrep/bandit)
  LambdaBFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-scanner'
      PackageType: Image
      ImageUri: !Ref ImageUri
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref DynamoDBTableName
          S3_BUCKET_NAME: !Ref S3BucketName
          ECS_CLUSTER_NAME: !Ref ECSClusterName
          ECS_TASK_DEFINITION: !Ref ECSTaskDefinitionArn
          ECS_SUBNETS: !If [HasSubnets, !Join [',', !Ref SubnetIds], '']
          ECS_SECURITY_GROUPS: !If [HasSecurityGroups, !Join [',', !Ref SecurityGroupIds], '']
      # Resource configuration for scanning workloads
      MemorySize: 3008  # Maximum Lambda memory (3GB)
      Timeout: 900      # 15 minutes (maximum Lambda timeout)
      ReservedConcurrentExecutions: 50  # Support up to 50 concurrent scan executions
      DeadLetterQueue:
        TargetArn: !GetAtt LambdaBDLQ.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Lambda B Dead Letter Queue
  LambdaBDLQ:
    Type: 'AWS::SQS::Queue'
    Properties:
      QueueName: !Sub '${ProjectName}-${Environment}-lambda-b-dlq'
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # SQS Event Source Mapping
  SQSEventSourceMapping:
    Type: 'AWS::Lambda::EventSourceMapping'
    Properties:
      EventSourceArn: !Ref SQSQueueArn
      FunctionName: !Ref LambdaBFunction
      BatchSize: 1  # Process one scan request at a time
      MaximumBatchingWindowInSeconds: 0
      FunctionResponseTypes:
        - ReportBatchItemFailures  # Enable partial batch failure handling
      ScalingConfig:
        MaximumConcurrency: 50  # Match reserved concurrency

  # CloudWatch Alarms for Monitoring
  LambdaBErrorAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-lambda-b-errors'
      AlarmDescription: 'Lambda B function errors'
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaBFunction
      TreatMissingData: notBreaching

  LambdaBDurationAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-lambda-b-duration'
      AlarmDescription: 'Lambda B function duration approaching timeout'
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 800000  # 800 seconds (13+ minutes)
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaBFunction
      TreatMissingData: notBreaching

  LambdaBThrottleAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-lambda-b-throttles'
      AlarmDescription: 'Lambda B function throttles'
      MetricName: Throttles
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref LambdaBFunction
      TreatMissingData: notBreaching

  # Lambda Function Version (for deployment tracking)
  LambdaBVersion:
    Type: 'AWS::Lambda::Version'
    Properties:
      FunctionName: !Ref LambdaBFunction
      Description: !Sub 'Initial version for ${Environment}'

  # Lambda Function Alias (for blue-green deployments)
  LambdaBAlias:
    Type: 'AWS::Lambda::Alias'
    Properties:
      FunctionName: !Ref LambdaBFunction
      FunctionVersion: !GetAtt LambdaBVersion.Version
      Name: !Ref Environment
      Description: !Sub 'Alias for ${Environment} environment'

Outputs:
  LambdaBFunctionName:
    Description: 'Lambda B Function Name'
    Value: !Ref LambdaBFunction
    Export:
      Name: !Sub '${ProjectName}-${Environment}-lambda-b-function-name'

  LambdaBFunctionArn:
    Description: 'Lambda B Function ARN'
    Value: !GetAtt LambdaBFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-lambda-b-function-arn'

  LambdaBAliasArn:
    Description: 'Lambda B Alias ARN'
    Value: !Ref LambdaBAlias
    Export:
      Name: !Sub '${ProjectName}-${Environment}-lambda-b-alias-arn'

  LambdaBDLQUrl:
    Description: 'Lambda B Dead Letter Queue URL'
    Value: !Ref LambdaBDLQ
    Export:
      Name: !Sub '${ProjectName}-${Environment}-lambda-b-dlq-url'

  LambdaBLogGroupName:
    Description: 'Lambda B CloudWatch Log Group Name'
    Value: !Ref LambdaBLogGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-lambda-b-log-group'